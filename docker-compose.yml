version: '3.8'

services:
  vehicle-scheduler:
    build:
      context: .
      dockerfile: vehicle_maintenance_scheduler/Dockerfile
    container_name: affordmed-vehicle-scheduler
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: notification_app_be/Dockerfile
    container_name: affordmed-notification-service
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
